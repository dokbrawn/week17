events {
    worker_connections 1024;
}

http {
    upstream shipments-svc {
        server shipments-svc:8130;
    }

    upstream notifications-svc {
        server notifications-svc:8131;
    }

    server {
        listen 80;
        server_name localhost;

        location /api/shipments {
            proxy_pass http://shipments-svc;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/notifications {
            proxy_pass http://notifications-svc;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /health {
            proxy_pass http://shipments-svc;
        }

        location / {
            return 200 '{"service":"shipments-gateway","status":"running"}';
            add_header Content-Type application/json;
        }
    }
}