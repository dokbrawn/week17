apiVersion: apps/v1
kind: Deployment
metadata:
    name: app
    namespace: week-17
    labels:
        com.docker.compose.project: week-17
        com.docker.compose.service: app
spec:
    replicas: 1
    selector:
        matchLabels:
            com.docker.compose.project: week-17
            com.docker.compose.service: app
    strategy:
        type: Recreate
    template:
        metadata:
            labels:
                com.docker.compose.project: week-17
                com.docker.compose.service: app
                com.docker.compose.network.shipments-network: "true"
        spec:
            restartPolicy: unless-stopped
            containers:
                - name: shipments-svc-s01
                  image: week-17-app
                  imagePullPolicy: IfNotPresent
                  env:
                    - name: GROUP
                      value: "431"
