                    - name: STUDENT_ID
                      value: "s01"
                  livenessProbe:
                    exec:
                        command: ['python -c import urllib.request; urllib.request.urlopen(''http://localhost:8130/health'')']
                    periodSeconds: 10
                    initialDelaySeconds: 10
                    timeoutSeconds: 5
                    failureThreshold: 3
                  ports:
                    - name: app-8130
                      containerPort: 8130
